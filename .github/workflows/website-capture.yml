name: "website-capture"

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "🌐 URLs to capture (one per line)"
        required: true
        type: string
      capture_mhtml:
        description: "📦 Save as MHTML (ZIP)"
        type: boolean
        default: true
      capture_pdf:
        description: "📄 Save as PDF (with extracted links)"
        type: boolean
        default: true
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo
          - release
          - drive
        default: repo

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # ── Python setup (MHTML) ────────────────────
      - name: "Set up Python"
        if: github.event.inputs.capture_mhtml == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Python dependencies"
        if: github.event.inputs.capture_mhtml == 'true'
        run: pip install pyppeteer

      # ── Node.js setup (PDF) ─────────────────────
      - name: "Set up Node.js"
        if: github.event.inputs.capture_pdf == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Install Node dependencies"
        if: github.event.inputs.capture_pdf == 'true'
        run: |
          npm init -y > /dev/null
          npm install playwright pdf-lib

      - name: "Install Playwright browsers"
        if: github.event.inputs.capture_pdf == 'true'
        run: npx playwright install --with-deps chromium

      - name: "Install Ghostscript"
        if: github.event.inputs.capture_pdf == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y ghostscript

      # ── Process all URLs ────────────────────────
      - name: "Process all URLs – MHTML"
        if: github.event.inputs.capture_mhtml == 'true'
        run: |
          while IFS= read -r url; do
            url="$(echo "$url" | xargs)"
            [ -z "$url" ] && continue
            echo "→ MHTML: $url"
            python .github/script/website-capture-mhtml.py --url "$url"
          done <<< "${{ github.event.inputs.urls }}"

      - name: "Process all URLs – PDF"
        if: github.event.inputs.capture_pdf == 'true'
        run: |
          mkdir -p website
          while IFS= read -r url; do
            url="$(echo "$url" | xargs)"
            [ -z "$url" ] && continue
            echo "→ PDF: $url"
            node .github/script/website-capture-pdf.js "$url"
            # Move the generated PDF into website/
            mv -- *.pdf website/ 2>/dev/null || true
          done <<< "${{ github.event.inputs.urls }}"

      # ── Archive captures into split ZIP(s) ─────
      - name: "Archive captures"
        if: always() && (github.event.inputs.capture_mhtml == 'true' || github.event.inputs.capture_pdf == 'true')
        id: archive
        run: |
          UPLOAD_METHOD="${{ inputs.upload_method }}"
          ...
          if [ "$UPLOAD_METHOD" = "repo" ]; then
            METHOD="split_push"
          else
            METHOD="release"
          fi

          # Drive / Release both prefer unsplit (unless >1950 MiB)
          if [ "$UPLOAD_TO_DRIVE" = "true" ] || [ "$UPLOAD_AS_RELEASE" = "true" ]; then
            METHOD="release"
          else
            METHOD="split_push"
          fi

          # Move current captures to a temp folder so we can zip them cleanly
          TEMP_DIR="captures_tmp"
          mv "$OUTPUT_DIR" "$TEMP_DIR"
          mkdir -p "$OUTPUT_DIR"

          RANDSTR=$(tr -dc 'a-z0-9' < /dev/urandom | head -c 5)
          ZIP_NAME="website-capture-${RANDSTR}.zip"
          echo "Archive name: ${ZIP_NAME} (method: $METHOD)"

          if [ "$METHOD" = "release" ]; then
            # Create unsplit ZIP, split only if > 1950 MiB
            (cd "$TEMP_DIR" && zip -r "../${OUTPUT_DIR}/${ZIP_NAME}" .)
            FULLZIP="${OUTPUT_DIR}/${ZIP_NAME}"
            SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 2044723200 ]; then
              echo "ZIP larger than 1950 MiB, splitting"
              rm "$FULLZIP"
              (cd "$TEMP_DIR" && zip -r -s 1950m "../${OUTPUT_DIR}/${ZIP_NAME}" .)
            fi
          else
            # split_push: always 99 MB parts
            (cd "$TEMP_DIR" && zip -r -s 99m "../${OUTPUT_DIR}/${ZIP_NAME}" .)
          fi

          rm -rf "$TEMP_DIR"

          echo "Archive contents:"
          ls -lh "$OUTPUT_DIR"

          # Asset list for release
          ls -1 "$OUTPUT_DIR" > "${OUTPUT_DIR}_assets.txt"
          cat "${OUTPUT_DIR}_assets.txt"

      # ────────────────────────────────────────────────────────
      # GOOGLE DRIVE UPLOAD (NEW)
      # ────────────────────────────────────────────────────────
      - name: "Upload to Google Drive"
        if: always() && inputs.upload_method == 'drive' && (github.event.inputs.capture_mhtml == 'true' || github.event.inputs.capture_pdf == 'true')
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          # 1. Obtain access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to obtain access token"
            exit 1
          fi

          # 2. Find or create 'github-actions' folder
          FOLDER_NAME="github-actions"
          QUERY="mimeType='application/vnd.google-apps.folder' and name='$FOLDER_NAME' and trashed=false"
          FOLDER_ID=$(curl -s -G \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "fields=files(id)" \
            "https://www.googleapis.com/drive/v3/files" | jq -r '.files[0].id // ""')
          if [ -z "$FOLDER_ID" ]; then
            echo "→ Creating folder '$FOLDER_NAME'"
            FOLDER_ID=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$FOLDER_NAME\", \"mimeType\":\"application/vnd.google-apps.folder\"}" \
              "https://www.googleapis.com/drive/v3/files?fields=id" | jq -r '.id')
            if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
              echo "❌ Failed to create folder"
              exit 1
            fi
          fi
          echo "✅ Folder ID: $FOLDER_ID"

          OUTPUT_DIR="website"
          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "→ Uploading $fname ($size bytes)..."

            # Initiate resumable upload session
            SESSION_URI=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json; charset=UTF-8" \
              -H "X-Upload-Content-Type: application/zip" \
              -d "{\"name\":\"$fname\", \"parents\":[\"$FOLDER_ID\"]}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
              -D - | tr -d '\r' | grep -i '^location:' | sed 's/^location: //i' | tr -d ' ')
            if [ -z "$SESSION_URI" ]; then
              echo "❌ Failed to initiate upload session for $fname, skipping"
              continue
            fi

            # Upload the entire file in one chunk
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: $size" \
              -H "Content-Range: bytes 0-$((size-1))/$size" \
              --data-binary "@$file" \
              "$SESSION_URI")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Uploaded $fname"
            else
              echo "❌ Upload failed with HTTP $HTTP_CODE"
            fi
          done

      # ── Push archives to repo (split_push) ─────
      - name: "Commit and push captures"
        if: always() && inputs.upload_method == 'repo' && (github.event.inputs.capture_mhtml == 'true' || github.event.inputs.capture_pdf == 'true')
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          OUTPUT_DIR="website"
          if [ -d "$OUTPUT_DIR" ] && [ "$(ls -A "$OUTPUT_DIR" 2>/dev/null)" ]; then
            git add "$OUTPUT_DIR/"
          else
            echo "No files found in $OUTPUT_DIR – skipping commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add website captures (ZIP) [skip ci]"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done

      # ── Create GitHub Release (release method) ──
      - name: "Create Release and upload assets"
        if: always() && inputs.upload_method == 'release' && (github.event.inputs.capture_mhtml == 'true' || github.event.inputs.capture_pdf == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="website"
          ASSETS_FILE="${OUTPUT_DIR}_assets.txt"

          if [ ! -s "$ASSETS_FILE" ]; then
            echo "No assets to release."
            exit 0
          fi

          RAND5=$(tr -dc 'a-z' < /dev/urandom | head -c 5)
          TAG="website-capture-${RAND5}"
          echo "Creating release tag: $TAG"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git tag "$TAG" -m "Website capture release"
          git push origin "$TAG"

          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS ${OUTPUT_DIR}/$file"
          done < "$ASSETS_FILE"

          gh release create "$TAG" $ASSET_ARGS \
            --title "website-capture-${RAND5}" \
            --notes "Automated release from Website Capture workflow." \
            --target "${{ github.ref_name }}"

          echo "Release '$TAG' created with assets."

      # ── Cleanup temporary files ─────────────────
      - name: "Cleanup"
        if: always()
        run: |
          rm -rf captures_tmp website_assets.txt 2>/dev/null || true
